# MetaWeave 元数据生成配置文件

# 数据库连接配置
database:
  host: ${DB_HOST:localhost}
  port: ${DB_PORT:5432}
  database: ${DB_NAME:your_database}
  user: ${DB_USER:postgres}
  password: ${DB_PASSWORD:your_password}
  
  # 连接池配置
  pool_min_size: 1
  pool_max_size: 5
  
  # 要处理的 schema 列表
  schemas:
    - public
  
  # 排除的表（支持通配符 *）
  exclude_tables:
    - temp_*
    - test_*
    - _*

# 数据采样配置
sampling:
  enabled: true
  sample_size: 1000            # 数据库采样行数上限：用于 --step ddl / --step json（含 json_llm 阶段A）画像计算；以及 --step rel / --step rel_llm 的评分阶段（inclusion_rate/jaccard/join 等需要查库的计算）
  sample_method: limit  # limit | tablesample | range
  
  # 列统计配置
  column_statistics:
    enabled: true
    value_distribution_threshold: 10  # 唯一值<=10时才统计值分布
  
  # 枚举识别配置
  enum_detection:
    enabled: true
    # 简单两值枚举的配置
    simple_two_value:
      max_null_rate: 0.3  # 最大空值比例
      min_occurrence_per_value: 2  # 每个值最少出现次数
      max_string_length: 20  # 字符串最大长度
  
  # 标识符识别配置
  identifier_detection:
    # 数据类型白名单：只有这些类型才可能被识别为 identifier
    # 使用白名单而非黑名单，确保安全性和可预测性
    allowed_data_types:
      # 整数类型
      - integer
      - int
      - int4
      - bigint
      - int8
      - smallint
      - int2
      - serial
      - bigserial
      - smallserial
      # 字符串类型
      - varchar
      - character varying
      - char
      - character
      - bpchar        # blank-padded char (PostgreSQL内部类型名)
      # UUID类型
      - uuid
      # 数值类型（需要额外检查 scale=0，无小数位才允许）
      - numeric
      - decimal
    
    # 统计阈值
    high_uniqueness_threshold: 0.95  # 规则2：高唯一性阈值
    min_non_null_rate: 0.80  # 规则2：最小非空率
    low_uniqueness_threshold: 0.05  # 规则3：排除枚举的最低唯一性
    # 排除关键词：包含这些关键词的字段名不识别为 identifier（子串匹配）
    exclude_keywords:
      - name        # 名称字段（如 company_name, username, name）
      - nm          # 名称缩写（如 dept_nm）
      - desc        # 描述字段（如 product_desc, description）
      - description # 完整描述（如 item_description）
      - remark      # 备注字段（如 order_remark）
      - comment     # 评论/注释字段（如 user_comment）
      - details     # 详情字段（如 product_details）
      - memo        # 备忘字段（如 transaction_memo）
      - summary     # 摘要字段（如 report_summary）
  
  # Description 检测配置（长文本说明字段）
  description_detection:
    enabled: true
    
    # 类型阈值
    min_varchar_length: 256       # varchar 最小长度（小于此值不考虑）
    
    # 长度统计阈值
    min_avg_length: 50            # 平均长度阈值（核心指标）
    max_stable_std: 5             # 稳定编码的最大标准差（用于排除固定格式编码）
    min_variance_std: 20          # 离散文本的最小标准差（高离散度强判定）
    
    # 其他阈值
    min_uniqueness: 0.7           # 最小唯一性
    
    # 命名模式（包含这些关键词倾向于识别为 description）
    include_keywords:
      - description
      - desc
      - note
      - notes
      - remark
      - remarks
      - comment
      - comments
      - memo
      - explain
      - explanation
      - detail
      - details
      - content
      - text
      - message
      - action
    
    # 排除关键词（包含这些关键词排除 description，倾向于 identifier）
    exclude_keywords:
      - code
      - _id
      - _key
      - _no
      - number
      - uuid
      - token

# 列画像配置
column_profiling:
  # 复杂类型集合：会被识别为 semantic_role="complex" 的数据类型
  # 说明：
  # - 这些类型本质上不适合作为外键关联（存储结构化/半结构化/二进制数据）
  # - 识别为 complex 后，可通过 exclude_semantic_roles 配置过滤
  # - 匹配规则：对 data_type 和配置都做 lower() 归一化（大小写不敏感）
  # - 数组特殊处理：配置 array 会同时匹配 ARRAY 类型和 integer[]/text[] 等后缀写法
  complex_types:
    # 当前阶段可识别的类型（基于 DDL 解析的 data_type）
    - json
    - jsonb
    - array          # 匹配 ARRAY 类型 + integer[]/text[] 等数组后缀
    - hstore
    - xml
    - bytea
    - tsvector
    - tsquery
    # PostgreSQL 内置几何类型（DDL 中直接显示类型名）
    - point
    - line
    - lseg
    - box
    - path
    - polygon
    - circle

    # 以下类型当前阶段无法识别（data_type 为 USER-DEFINED）
    # 需要引入 udt_name 后再启用
    # - geometry      # PostGIS
    # - geography     # PostGIS
    # - int4range     # range 类型
    # - int8range
    # - numrange
    # - tsrange
    # - tstzrange
    # - daterange

    # 可选：视业务而定（如需要可加入）
    # - inet          # 有的系统会用 inet 做关联键
    # - cidr
    # - macaddr
    # - macaddr8
    # - bit
    # - varbit

# LLM 配置
llm:
  # 当前激活的 LLM 提供商
  active: qwen                    # 可选值: qwen | deepseek
  
  # 批量处理和重试配置
  batch_size: 10                  # 批量处理大小
  retry_times: 2                  # API 调用失败时的最大重试次数（应用层重试）
  retry_delay: 2                  # 重试间隔（秒）
  
  # LangChain 客户端配置（通用）
  langchain_config:
    use_async: true               # 是否使用异步 API (ainvoke)
    async_concurrency: 10          # 异步并发限制（建议 10-50，防止触发限流）
    max_retries: 3                # SDK 内部网络重试次数（覆盖默认值）
    batch_size: 50                # 异步批量构建 prompt 的大小（控制内存）

  # 各 LLM 提供商配置
  providers:
    # Qwen 配置
    qwen:
      model: qwen-plus            # 模型名称：qwen-turbo, qwen-plus, qwen-max, qwen-long
      api_key: ${DASHSCOPE_API_KEY}
      api_base: ${DASHSCOPE_BASE_URI}  # 可选，默认使用 Dashscope 默认地址
      
      # 基础参数
      temperature: 0.3
      #max_tokens: 500
      timeout: 60
      
      # Qwen 特定参数（可选，空值不传递）
      extra_params:
        enable_thinking: false     # 启用思考模式（Qwen 特有）
        streaming: false          # 是否流式输出（注意：参数名是 streaming 不是 stream）
        #top_p: 0.8                # Top-P 采样（可选，控制采样范围）
    
    # DeepSeek 配置
    deepseek:
      model: deepseek-chat        # 模型名称
      api_key: ${DEEPSEEK_API_KEY}
      api_base: ${DEEPSEEK_BASE_URI}
      
      # 基础参数
      temperature: 0.3
      #max_tokens: 500
      timeout: 60
      
      # DeepSeek 特定参数（可选，空值不传递）
      # extra_params:
      #   top_p: 0.95
      #   frequency_penalty: 0.0
      #   presence_penalty: 0.0

# Embedding 配置
embedding:
  # 当前激活的 Embedding 提供商
  active: qwen                    # 可选值: qwen（预留扩展其他 provider）

  # 批量处理和重试配置
  batch_size: 10                  # Qwen API 限制：批量请求大小不能超过 10
  max_retries: 3                  # API 调用失败时的最大重试次数
  timeout: 30                     # 请求超时（秒）

  # 各 Embedding 提供商配置
  providers:
    # Qwen Embedding 配置
    qwen:
      model: text-embedding-v3
      api_key: ${DASHSCOPE_API_KEY}
      api_base: ${DASHSCOPE_BASE_URI}   # 复用系统已有 DashScope 地址
      dimensions: 1024                  # 模型输出维度（用于预分配与校验）

# 向量数据库配置
vector_database:
  # 当前激活的向量数据库类型
  active: milvus                    # 可选值: milvus | pgvector

  # 各向量数据库提供商配置
  providers:
    # Milvus 配置
    milvus:
      host: ${MILVUS_HOST:localhost}
      port: ${MILVUS_PORT:19530}
      database: ${MILVUS_DATABASE:nl2sql}  # 等价于 PostgreSQL 的 schema
      user: ${MILVUS_USER:}                # 可选，开源版通常无认证
      password: ${MILVUS_PASSWORD:}        # 可选

      # 连接选项
      timeout: 30
      pool_size: 10

    # PgVector 配置（预留）
    pgvector:
      use_global_config: true   # 复用 database 配置
      schema: vectors             # 向量数据存储的 schema

# 注释生成配置,启用llm
llm_comment_generation:
  enabled: true                 # 总开关
  language: zh  # 注释语言：zh / en / bilingual
  max_columns_per_call: 120     # 单批处理的缺失字段上限
  enable_batch_processing: true # 超过上限时自动分批
  overwrite_existing: false     # 默认不覆盖已有注释

# 逻辑主键识别配置
logical_key_detection:
  enabled: true
  min_confidence: 0.8
  max_combinations: 3  # 最多考虑 3 字段组合
  
  # 主键字段名模式
  name_patterns:
    - id
    - code
    - key
    - no
    - number
    - pk

# 输出配置
output:
  output_dir: output

  # Step 1: DDL 抽取输出配置
  ddl_directory: output/ddl

  # Step 2: 表/列画像输出配置
  json_directory: output/json      # --step json 和 --step json_llm 统一输出目录 / --step rel & cql 输入
  # json_llm_directory: output/json_llm  # ⚠️ 已废弃，cql_llm 不再读取此配置

  # Step 3: 关系发现输出配置
  rel_directory: output/rel    # --step rel/rel_llm 输出 / --step cql 输入
  rel_granularity: global  # global | schema (Phase 1只支持global)
  rel_id_salt: ""          # 关系ID哈希盐值（可选）

  # Step 4: CQL 生成输出配置
  cql_directory: output/cql    # --step cql/cql_llm 输出 / load 输入

  # Step 5: Markdown 生成输出配置
  markdown_directory: output/md

  # 注意：
  # - --step cql 和 --step cql_llm 功能完全等价
  # - 都从 json_directory 和 rel_directory 读取数据
  # - 输出到 cql_directory，生成 import_all.{db}.cypher 和 import_all.{db}.md

  # 输出格式
  formats:
    - ddl
    - markdown
    - json
  
  # DDL 选项
  ddl_options:
    include_comments: true
    include_indexes: true
    sample_records:
      enabled: true
      count: 5
      label_prefix: "Record"
  
  # Markdown 选项
  markdown_options:
    include_sample_data: true
    sample_rows: 5
    include_statistics: true

# 日志配置
logging:
  level: INFO  # DEBUG | INFO | WARNING | ERROR
  log_file: logs/metadata.log
  console_output: true

# Step 3: 关系发现配置
relationships:
  # sample_size: 1000  # 已废弃：关系评分阶段统一使用 sampling.sample_size
  name_similarity:
    method: embedding
    cache_size: 5000
  
  # 评分权重（4维度评分体系）
  weights:
    inclusion_rate: 0.55        # 数据包含率（核心指标）
    name_similarity: 0.20       # 列名相似度（防止假阳性）
    type_compatibility: 0.15    # 类型兼容性（体现JOIN性能）
    jaccard_index: 0.10         # Jaccard相似度（辅助判断）

# 单列候选配置
single_column:
  important_constraints:
    - single_field_primary_key
    - single_field_unique_constraint
  exclude_semantic_roles:
    - audit
    - metric
    - description  # 新增：description 字段不适合作为关联键
    - complex      # 复杂类型字段（json/jsonb/array/bytea等）不适合作为关联键
  logical_key_min_confidence: 0.8
  min_type_compatibility: 0.8  # 最低类型兼容性阈值
  name_similarity_important_target: 0.6  # 目标列是关键字段时的名称相似度阈值,非embedding方式建议0.6,embedding方式建议0.9
  name_similarity_normal_target: 0.9     # 目标列是普通字段时的名称相似度阈值,非embedding方式建议0.9

# 复合键候选配置
composite:
  max_columns: 3  # 最多考虑3列的复合键
  # ❌ target_sources 配置已废弃（2025-12-30）
  # 说明：索引已完全排除在关系发现逻辑之外，此配置项不再生效
  # target_sources: []  
  min_type_compatibility: 0.8  # 类型兼容性阈值
  logical_key_min_confidence: 0.8  # 逻辑主键最低置信度
  name_similarity_important_target: 0.6  # 特权模式目标列的名称相似度阈值,非embedding方式建议0.6,embedding方式建议0.9

  # === 复合键排除的语义角色（可配置） ===
  # 说明：
  # - 用于逻辑主键生成阶段（LogicalKeyDetector）：在生成复合逻辑主键时排除这些角色的字段
  # - 用于候选生成阶段（CandidateGenerator）：在匹配关系时过滤目标表逻辑约束中的这些角色
  # - 不影响物理约束（PK/UK）：物理约束始终完全不过滤
  exclude_semantic_roles:
    - metric        # 度量字段（如 amount, sales）明确不适合作为关联键
    # 可选：如果发现 description 字段影响关系质量，可以取消下面的注释
    - description   # 长文本说明字段（如 remark, note）
    - attribute     # 属性字段（如 address, phone）
    - complex       # 复杂类型字段（json/jsonb/array/bytea等）不适合作为关联键

# 决策配置
decision:
  accept_threshold: 0.65  # 最低接受阈值
  high_confidence_threshold: 0.90
  medium_confidence_threshold: 0.80
  suppress_single_if_composite: true  # 复合关系存在时抑制单列关系

# 评分权重（优化后：4维度评分体系）
weights:
  inclusion_rate: 0.55        # 数据包含率（核心指标，提升权重）
  name_similarity: 0.20       # 列名相似度（防止假阳性）
  type_compatibility: 0.15    # 类型兼容性（体现JOIN性能）
  jaccard_index: 0.10         # Jaccard相似度（辅助判断，降低权重）
  # 已删除的维度：
  # - uniqueness: 0.10 （逻辑错误：外键关系中应评估源列而非目标列）
  # - semantic_role_bonus: 0.05 （推断不严谨，权重过小，意义不大）

# Domain 生成配置（业务主题推断）
domain_generation:
  # 送入 LLM 的 MD 文件数量上限（优先级：CLI --md-limit > 此值 > 默认 100）
  md_context_limit: 100
  # 可选：为 Domain 生成指定专属 LLM（未配置时 fallback 到全局 llm）
  # llm:
  #   provider: openaiwoca
  #   model_name: gpt-4o
  #   temperature: 0.1

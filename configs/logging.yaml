# MetaWeave 日志配置（按 step 拆分，不考虑兼容性）

version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - [%(step)s] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

  detailed:
    format: '%(asctime)s - %(name)s - [%(step)s] - [%(filename)s:%(lineno)d] - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

filters:
  ddl_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['ddl']
  json_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['json', 'json_llm']
  md_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['md']
  rel_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['rel', 'rel_llm']
  cql_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['cql', 'cql_llm']
  all_filter:
    (): metaweave.utils.logger.StepFilter
    allowed_steps: ['all']

handlers:
  # console handler 保持原样（不加 StepFilter），确保所有日志实时输出到终端
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout

  ddl_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/ddl.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [ddl_filter]

  json_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/json.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [json_filter]

  md_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/md.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [md_filter]

  rel_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/rel.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [rel_filter]

  cql_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/cql.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [cql_filter]

  all_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/metaweave_all.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8
    filters: [all_filter]

  # loader 日志保持原样（不拆分 step）
  loader_file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/loader.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

loggers:
  # MetaWeave 全局 logger：允许 DEBUG，所有子 logger 默认继承
  metaweave:
    level: DEBUG
    handlers: []
    propagate: true

  # loader：彻底隔离，只写 loader.log + console，不向上级传播
  metaweave.loader:
    level: DEBUG
    handlers: [loader_file, console]
    propagate: false

  metaweave.core.loaders:
    level: DEBUG
    handlers: [loader_file, console]
    propagate: false

  metaweave.dim_value.loader:
    level: DEBUG
    handlers: [loader_file, console]
    propagate: false

  metaweave.table_schema.loader:
    level: DEBUG
    handlers: [loader_file, console]
    propagate: false

root:
  level: INFO
  handlers: [console, ddl_file, json_file, md_file, rel_file, cql_file, all_file]

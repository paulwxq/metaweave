# 数据库业务主题配置
database:
  name: highway_db
  description: highway_db 是一个面向高速公路服务区全生命周期运营管理的业务分析型数据库，覆盖服务区基础资产、经营主体、空间拓扑（路段/路线/服务区层级关系）、多渠道日度经营数据（交易金额、订单数、车流车型统计）、企业组织架构、跨系统服务对象映射、数据治理元信息及用户反馈闭环等核心场景，支撑运营监控、商业分析、资源调度与智能SQL优化。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
  tables:
  - highway_db.public.qa_feedback
- name: 服务区基础资产与地理拓扑
  description: 管理高速公路服务区的空间实体属性、位置信息、类型状态、所属公司，以及其与路段、路线之间的层级与关联关系，构成服务区数字化空间骨架。
  tables:
  - highway_db.public.bss_service_area
  - highway_db.public.bss_section_route
  - highway_db.public.bss_section_route_area_link
- name: 经营主体与组织架构
  description: 记录参与服务区运营的企业主体（含分公司）及其编号、名称、审计信息，明确经营责任归属与组织管理边界。
  tables:
  - highway_db.public.bss_company
  - highway_db.public.bss_branch
- name: 日度经营与客流分析
  description: 采集并聚合各营业网点按日维度的多支付渠道交易数据（金额、订单数）及服务区域车流分车型统计，支撑营收监控与消费行为分析。
  tables:
  - highway_db.public.bss_business_day_data
  - highway_db.public.bss_car_day_count
- name: 数据治理与元信息管理
  description: 存储高速公路领域数据资产的元数据描述，包括主题定义、关联表结构、常见问题、关键词标签等，服务于数据发现、理解与质量管控。
  tables:
  - highway_db.public.highway_metadata
- name: 跨系统服务对象主数据映射
  description: 建立不同业务系统间服务区标识体系的标准化映射关系，解决同服务区在多源系统中命名、编码不一致问题，保障主数据一致性。
  tables:
  - highway_db.public.bss_service_area_mapper

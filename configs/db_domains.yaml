# 数据库业务主题配置
database:
  name: highway_db
  description: highway_db数据库主要用于存储和管理多个高速公路服务区的各种运营数据，包括但不限于服务区的基本信息、每日经营状况、车辆类型使用情况以及相关联的企业信息等。此外，还涉及对服务区及其路线的关联性描述，以及用户对于SQL查询结果的反馈记录。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
  tables: []
- name: 服务区基本信息
  description: 负责维护服务区的基础信息，如名称、位置、所属公司等。
  tables:
  - highway_db.public.bss_service_area
  - highway_db.public.bss_company
- name: 服务区经营分析
  description: 收集并分析各服务区日常经营活动的数据，例如支付渠道交易笔数与金额汇总。
  tables:
  - highway_db.public.bss_business_day_data
- name: 车辆流量统计
  description: 按日统计通过服务区域的不同车型数量，用于交通流量分析。
  tables:
  - highway_db.public.bss_car_day_count
- name: 路段与路线管理
  description: 记录高速公路路段与路线之间的关系，并关联至具体的服务区。
  tables:
  - highway_db.public.bss_section_route
  - highway_db.public.bss_section_route_area_link
- name: 服务区餐饮及零售
  description: 跟踪服务区内的餐饮及小吃分支网点的信息。
  tables:
  - highway_db.public.bss_branch
- name: 元数据管理
  description: 存储有关高速公路业务的主题定义、关键词等元信息。
  tables:
  - highway_db.public.highway_metadata
- name: 用户反馈
  description: 收集用户对系统生成SQL查询结果的意见反馈。
  tables:
  - highway_db.public.qa_feedback

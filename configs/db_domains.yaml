# 数据库业务主题配置
database:
  name: SakilaRental
  description: SakilaRental 是一个面向影视租赁业务的全栈式关系型数据库系统，核心覆盖客户管理、门店运营、影片资产、演员与分类元数据、地理行政区划（国家/城市/地址）、租赁交易生命周期（租借、归还、支付）、员工组织架构及库存调度等模块。系统支持多门店协同、多语言影片管理、分级内容控制、全文检索，并通过严谨的外键约束和索引设计保障数据一致性与查询性能。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
- name: 客户与账户管理
  description: 涵盖客户基本信息、联系方式、地址关联、账户激活状态及创建时间，支撑租户身份识别、服务准入与生命周期管理。
- name: 门店与员工组织
  description: 管理实体门店信息、员工档案、岗位归属（含经理指派）、登录凭证及联系信息，构成线下服务网络与人员调度基础。
- name: 影片资产与元数据
  description: 存储电影标题、描述、年份、时长、评级、语言、租赁价格、赔偿成本及特殊花絮等核心资产属性，并支持全文检索。
- name: 内容分类与演职关系
  description: 维护电影分类体系（如动作、动画）、演员名录，以及电影-演员、电影-分类的多对多关联，支撑内容标签化与推荐逻辑。
- name: 地理空间与地址体系
  description: 构建国家、城市、行政区、详细地址四级地理层级模型，为客户、门店、员工提供标准化位置主数据及区域分析能力。
- name: 租赁业务流程
  description: 完整记录租赁事件（时间、库存项、客户、员工、归还状态）、支付明细（金额、时间、关联方）及库存分布（门店-影片映射），驱动营收与履约闭环。

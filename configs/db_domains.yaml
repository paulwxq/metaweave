# 数据库业务主题配置
database:
  name: highway_db
  description: highway_db数据库专注于管理高速公路服务区的各种运营数据，包括服务区基本信息、日营业情况、车辆使用统计、公司信息及路段与服务区的关联关系等。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
  tables: []
- name: 服务区管理
  description: 处理与服务区直接相关的所有信息，如服务区的基本详情及其与业务系统的映射。
  tables:
  - highway_db.public.bss_service_area
  - highway_db.public.bss_service_area_mapper
- name: 商业运营
  description: 记录并分析服务区内的商业活动表现，包括每日通过不同支付渠道产生的交易量和金额。
  tables:
  - highway_db.public.bss_business_day_data
- name: 交通流量分析
  description: 跟踪并报告每天不同类型车辆在服务区内停留或使用的频率，帮助优化资源配置。
  tables:
  - highway_db.public.bss_car_day_count
- name: 企业组织结构
  description: 存储有关负责管理这些服务区的企业实体的信息，包括分公司详情。
  tables:
  - highway_db.public.bss_company
- name: 地理信息
  description: 维护关于高速公路路段如何连接以及它们与哪些服务区相关联的数据。
  tables:
  - highway_db.public.bss_section_route
  - highway_db.public.bss_section_route_area_link
- name: 餐饮服务
  description: 涵盖各服务区内部提供的食品和饮料服务点的具体位置及相关信息。
  tables:
  - highway_db.public.bss_branch

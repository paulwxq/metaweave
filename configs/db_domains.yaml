# 数据库业务主题配置
database:
  name: sakila_dvd_rental
  description: 这是一个面向全球DVD影片租赁连锁店的全业务运营数据库，完整支撑门店管理、客户租赁服务、影片资产与库存管理、员工协作、多级地理区域（国家/城市/地址）建模、影片元数据（含分类、演员、语言、评级、时长、租金与赔偿）、租赁交易生命周期（租借、归还、支付）以及账户与权限管理等核心场景。系统采用规范化设计，支持高并发租赁操作、全文检索、多对多关联查询及精细化财务核算。
llm_inference:
  max_domains_per_table: 3
domains:
- name: _未分类_
  description: 无法归入其他业务主题的表
  tables: []
- name: 客户与账户管理
  description: 管理租赁业务的终端客户信息、账户状态、联系方式及归属门店，支撑会员服务、通知触达与活跃度分析
  tables:
  - dvdrental.public.customer
  - dvdrental.public.address
  - dvdrental.public.city
  - dvdrental.public.country
- name: 门店与组织架构
  description: 定义物理经营单元（门店）、其地理位置、负责人（经理）及员工组织关系，支撑区域运营、人力分配与门店绩效分析
  tables:
  - dvdrental.public.store
  - dvdrental.public.staff
  - dvdrental.public.address
  - dvdrental.public.city
  - dvdrental.public.country
- name: 影片资产与内容管理
  description: 存储影片核心元数据（标题、描述、年份、时长、评级、语言、租金、赔偿成本）、分类体系、演员阵容及特别属性，构成数字资产目录基础
  tables:
  - dvdrental.public.film
  - dvdrental.public.category
  - dvdrental.public.actor
  - dvdrental.public.language
  - dvdrental.public.film_actor
  - dvdrental.public.film_category
- name: 库存与租赁运营
  description: 跟踪每部影片在各门店的实物库存分布，记录完整的租赁行为（时间、客户、员工、归还状态）及库存状态变更，是业务执行的核心事务链
  tables:
  - dvdrental.public.inventory
  - dvdrental.public.rental
- name: 财务与交易管理
  description: 记录所有租赁产生的支付行为，包括金额、时间、客户、员工、关联租赁单，支撑营收统计、对账与财务合规
  tables:
  - dvdrental.public.payment
